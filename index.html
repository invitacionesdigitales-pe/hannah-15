</head>
<body>

    <span class="brillo" style="top: 42%; left: 20%; animation-delay: 1.1s; scale: 0.6;"></span>
    <span class="brillo" style="top: 48%; left: 60%; animation-delay: 0.5s; scale: 0.9;"></span>
    
    <span class="brillo" style="top: 55%; left: 10%; animation-delay: 1.5s; scale: 1.2;"></span>
    <span class="brillo" style="top: 62%; left: 80%; animation-delay: 0.1s; scale: 0.5;"></span>
    <span class="brillo" style="top: 68%; left: 35%; animation-delay: 0.9s; scale: 0.8;"></span>

    <span class="brillo" style="top: 74%; left: 90%; animation-delay: 1.3s; scale: 1.0;"></span>

<div class="mariposas-container">
    <div class="mariposa" style="top: 15%; left: -10%; animation-delay: 0s; scale: 0.7;">
        <div class="ala-izq"></div>
        <div class="ala-der"></div>
    </div>
    <div class="mariposa" style="top: 45%; left: -10%; animation-delay: 3s; scale: 0.4;">
        <div class="ala-izq"></div>

    <div class="mariposa" style="top: 75%; left: -10%; animation-delay: 6s; scale: 0.5;">

    </div>
    <div class="mariposa" style="top: 30%; left: -10%; animation-delay: 1.5s; scale: 0.55;">
        <div class="ala-izq"></div>
        <div class="ala-der"></div>
    </div>
    <div class="mariposa" style="top: 60%; left: -10%; animation-delay: 4.5s; scale: 0.35;">
        <div class="ala-izq"></div>
        <div class="ala-der"></div>
    </div>
    <div class="mariposa" style="top: 85%; left: -10%; animation-delay: 8s; scale: 0.65;">
        <div class="ala-izq"></div>
        <div class="ala-der"></div>
    </div>

    <div id="container">

        <div id="principal">
            <img src="assets/14.png" alt="">
            <img src="assets/10.png" alt="" class="animar-entrada" style="animation-delay: 0s;">
            <img src="assets/11.png" alt="" class="animar-entrada" style="animation-delay: 0.5s;">   
            <img src="assets/12.png" alt="" class="animar-entrada" style="animation-delay: 1s;">
            <img src="assets/13.png" alt="" class="animar-entrada" style="animation-delay: 1.5s;">   
        </div>

        <div id="seccion-musica" class="bloque-con-fondo">
            <img src="assets/16.png" class="fondo-15" alt="">
            <div id="playContainer">
                <button id="playBtn">❤</button>
            </div>
            <audio id="audioPlayer">
                <source src="assets/song.mp3" type="audio/mpeg">
                Tu navegador no soporta el formato de audio.
            </audio>
        </div>

        <div id="seccion-cuenta-regresiva" class="bloque-con-fondo">
            <img src="assets/17.png" class="fondo-15" alt="">
            <div id="fecha">
                <div class="countdown-container">
                    <div class="countdown-box">
                        <div class="value" id="days">0</div>
                        <div class="label">Días</div>
                    </div>
                    <div class="countdown-box">
                        <div class="value" id="hours">0</div>
                        <div class="label">Horas</div>
                    </div>
                    <div class="countdown-box">
                        <div class="value" id="minutes">0</div>
                        <div class="label">Minutos</div>
                    </div>
                    <div class="countdown-box">
                        <div class="value" id="seconds">0</div>
                        <div class="label">Segundos</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bloque-con-fondo">
            <img src="assets/18.png" class="fondo-15" alt="">
        </div>

        <div class="bloque-con-fondo">
            <img src="assets/19.png" class="fondo-15" alt="">
        </div>

        <div id="seccion-ubicacion" class="bloque-con-fondo">
            <img src="assets/20.png" class="fondo-15" alt="">
            <div class="elemento-flotante" style="top: 76%; left: 50%;">
                <button class="btn-dorado-redondeado" onclick="window.open('https://maps.app.goo.gl/pBGkz8otqsBtGPG66', '_blank')">
                    Ver Ubicación
                </button>
            </div>
        </div>

        <div id="confirmacion">
            <h2>Te esperamos</h2>
            <p>
                Tu presencia es importante para <br>
                nosotros, por favor confirma tu <br>
                asistencia. 
            </p>
            <button onclick="window.open('https://wa.me/51976331090', '_blank')">
                Confirmar
            </button>
        </div>

    </div>

    <script>
        document.getElementById('playBtn').addEventListener('click', function() {
            var audio = document.getElementById('audioPlayer');
            audio.play();
        });

        const targetDate = new Date("2026-07-05T14:00:00").getTime();
        const countdown = setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            if (difference < 0) {
                clearInterval(countdown);
                document.getElementById("days").innerText = 0;
                document.getElementById("hours").innerText = 0;
                document.getElementById("minutes").innerText = 0;
                document.getElementById("seconds").innerText = 0;
            }
        }, 1000);
    </script>
</body>
</html>
